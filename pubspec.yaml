publish_to: 'none'
version: 0.1.2

environment:
  sdk: ^3.10.4

dependencies:
  flutter_bloc: ^9.1.1
  buttons_tabbar: ^1.3.8
  date_picker_timeline: ^1.2.7
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.7
